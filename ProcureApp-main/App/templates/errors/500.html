{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 140px);">
    <div class="col-12 col-md-6">
        <div class="text-center">
            <!-- Error Icon -->
            <div style="font-size: 5rem; color: var(--color-danger); margin-bottom: var(--space-6);">
                <i class="bi bi-exclamation-circle-fill"></i>
            </div>

            <!-- Error Code & Title -->
            <h1 class="mb-3" style="color: var(--color-navy); font-size: 3rem;">500</h1>
            <h2 class="mb-4" style="color: var(--color-text-primary);">Σφάλμα Διακομιστή</h2>

            <!-- Error Message -->
            <p class="text-secondary mb-6" style="font-size: var(--font-size-md);">
                Κάτι πήγε στραφερά στον διακομιστή. Το έχουμε ήδη καταγράψει και θα το διορθώσουμε σύντομα. Δοκιμάστε ξανά αργότερα.
            </p>

            <!-- Action Button -->
            <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg px-6">
                <i class="bi bi-arrow-left me-2"></i>Επιστροφή στην Αρχική
            </a>
        </div>
    </div>
</div>
{% endblock %}
