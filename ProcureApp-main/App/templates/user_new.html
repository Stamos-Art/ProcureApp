{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="mb-3">
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.users') }}"><i class="bi bi-arrow-left"></i> Πίσω στους Χρήστες</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0">Δημιουργία Νέου Χρήστη</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Κωδικός Πρόσβασης <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label">Πλήρες Όνομα / Επωνυμία (Display Name) <span class="text-danger">*</span></label>
                            <input type="text" name="display_name" class="form-control" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Όνομα</label>
                            <input type="text" name="first_name" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Επώνυμο</label>
                            <input type="text" name="last_name" class="form-control">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Ρόλος <span class="text-danger">*</span></label>
                            <select name="role" class="form-select" required>
                                <option value="company">Υπάλληλος (Company)</option>
                                <option value="supplier">Προμηθευτής (Supplier)</option>
                                <option value="chief">Διευθυντής (Chief)</option>
                            </select>
                        </div>

                        <div id="supplier-fields" style="display: none;" class="border rounded p-3 bg-light mb-3">
                            <h6 class="mb-3 text-primary"><i class="bi bi-buildings"></i> Στοιχεία Προμηθευτή</h6>
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label text-muted small text-uppercase fw-bold">Επωνυμία Εταιρείας</label>
                                    <input type="text" name="company_name" class="form-control" placeholder="π.χ. ΠΑΠΑΔΟΠΟΥΛΟΣ Α.Ε.">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small text-uppercase fw-bold">ΑΦΜ</label>
                                    <input type="text" name="tax_id" class="form-control" placeholder="000000000">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small text-uppercase fw-bold">Τηλέφωνο</label>
                                    <input type="text" name="phone" class="form-control">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label text-muted small text-uppercase fw-bold">IBAN</label>
                                    <input type="text" name="iban" class="form-control" placeholder="GR00 0000 ...">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label text-muted small text-uppercase fw-bold">Διεύθυνση</label>
                                    <input type="text" name="address" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small text-uppercase fw-bold">Πόλη</label>
                                    <input type="text" name="city" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small text-uppercase fw-bold">Τ.Κ.</label>
                                    <input type="text" name="postal_code" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-flex justify-content-between mt-4">
                            <a href="{{ url_for('admin.users') }}" class="btn btn-light">Ακύρωση</a>
                            <button type="submit" class="btn btn-success px-4">Δημιουργία</button>
                        </div>

                        <script>
                            document.querySelector('select[name="role"]').addEventListener('change', function() {
                                document.getElementById('supplier-fields').style.display = (this.value === 'supplier') ? 'block' : 'none';
                            });
                        </script>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
