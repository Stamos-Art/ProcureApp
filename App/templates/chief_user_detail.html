{% extends "base.html" %}

{% block content %}
<div class="mb-3">
  <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.users') }}"><i class="bi bi-arrow-left"></i> Πίσω στους Χρήστες</a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <h4 class="mb-4">Λεπτομέρειες Χρήστη: <span class="text-primary">{{ user.username }}</span></h4>

    <form method="post" class="row g-3" id="userDetailForm">
      <div class="col-md-4">
        <label class="form-label text-muted">Username (Μη επεξεργάσιμο)</label>
        <input class="form-control bg-light" value="{{ user.username }}" disabled>
      </div>
      <div class="col-md-4">
        <label class="form-label">Εμφανιζόμενο όνομα <span class="text-danger">*</span></label>
        <input class="form-control" name="display_name" value="{{ user.display_name }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Ρόλος</label>
        <select class="form-select" name="role">
          <option value="chief" {{ 'selected' if user.role=='chief' else '' }}>Διευθυντής (Chief)</option>
          <option value="company" {{ 'selected' if user.role=='company' else '' }}>Υπάλληλος (Εταιρεία)</option>
          <option value="supplier" {{ 'selected' if user.role=='supplier' else '' }}>Προμηθευτής (Supplier)</option>
        </select>
      </div>

      <div class="col-md-4 mt-4" id="approvalLimitSection" style="{{ 'display:none;' if user.role == 'supplier' else '' }}">
        <label class="form-label fw-bold text-success">
            <i class="bi bi-cash-coin me-1"></i> Όριο Έγκρισης (€) 
            <i class="bi bi-info-circle text-muted fw-normal ms-1" title="Ισχύει για ρόλο Employee & Chief" data-bs-toggle="tooltip"></i>
        </label>
        <input type="number" step="0.01" min="0" class="form-control border-success" name="approval_limit" value="{{ user.approval_limit if user.approval_limit is not none else '500.00' }}">
        <small class="text-muted">Αφήστε κενό ή 0 αν θέλετε να απαιτείται πάντα έγκριση.</small>
      </div>

      <div class="col-md-4 mt-4">
        <div class="form-check form-switch fs-5">
          <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {{ 'checked' if user.is_active else '' }} value="1">
          <label class="form-check-label ms-2" for="is_active">{{ 'Ενεργός Λογαριασμός' if user.is_active else 'Ανενεργός Λογαριασμός' }}</label>
        </div>
      </div>
      <div class="col-md-8 mt-3">
        <label class="form-label">Αλλαγή Κωδικού Πρόσβασης (Προαιρετικό)</label>
        <input type="password" class="form-control" name="password" placeholder="Αφήστε κενό αν δεν θέλετε να τον αλλάξετε">
      </div>

      {% set is_supplier = (user.role == 'supplier') %}
      
      <div class="col-12 mt-5">
        <h5 class="border-bottom pb-2 text-info"><i class="bi bi-buildings"></i> Στοιχεία Προμηθευτή (Αν ο ρόλος είναι Supplier)</h5>
      </div>

      <div class="col-md-6">
        <label class="form-label">Επωνυμία Εταιρείας</label>
        <input class="form-control" name="company_name" value="{{ (user.profile.company_name if user.profile else '') }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">ΑΦΜ</label>
        <input class="form-control" name="tax_id" value="{{ (user.profile.tax_id if user.profile else '') }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">IBAN</label>
        <input class="form-control" name="iban" value="{{ (user.profile.iban if user.profile else '') }}">
      </div>

      <div class="col-md-4">
        <label class="form-label">Υπεύθυνος Επικοινωνίας</label>
        <input class="form-control" name="contact_name" value="{{ (user.profile.contact_name if user.profile else '') }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Τηλέφωνο</label>
        <input class="form-control" name="phone" value="{{ (user.profile.phone if user.profile else '') }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Email</label>
        <input class="form-control" name="email" value="{{ (user.profile.email if user.profile else '') }}">
      </div>

      <div class="col-md-6">
        <label class="form-label">Διεύθυνση</label>
        <input class="form-control" name="address" value="{{ (user.profile.address if user.profile else '') }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Πόλη</label>
        <input class="form-control" name="city" value="{{ (user.profile.city if user.profile else '') }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Τ.Κ.</label>
        <input class="form-control" name="postal_code" value="{{ (user.profile.postal_code if user.profile else '') }}">
      </div>

      <div class="col-12">
        <label class="form-label">Σημειώσεις</label>
        <textarea class="form-control" name="notes" rows="3">{{ (user.profile.notes if user.profile else '') }}</textarea>
      </div>

      <div class="col-12 mt-4 d-flex gap-2">
        <button class="btn btn-primary px-4" type="submit">Αποθήκευση Αλλαγών</button>
        <a class="btn btn-light" href="{{ url_for('admin.users') }}">Άκυρο</a>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('userDetailForm');
    
    form.addEventListener('keydown', function(event) {
        // Ελέγχουμε αν πατήθηκε το Enter
        if (event.key === 'Enter') {
            // Αν ΔΕΝ είμαστε μέσα σε Textarea (π.χ. Σημειώσεις), σταματάμε την υποβολή
            if (event.target.tagName !== 'TEXTAREA') {
                event.preventDefault();
                return false;
            }
        }
    });

    // Toggle Approval Limit visibility based on role
    const roleSelect = document.querySelector('select[name="role"]');
    const approvalSection = document.getElementById('approvalLimitSection');
    
    if (roleSelect && approvalSection) {
        roleSelect.addEventListener('change', function() {
            if (this.value === 'supplier') {
                approvalSection.style.display = 'none';
            } else {
                approvalSection.style.display = 'block';
            }
        });
    }
});
</script>
{% endblock %}
