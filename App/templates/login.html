{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 120px);">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
        <div class="card shadow-lg" style="border: none; border-radius: var(--radius-xl);">
            <div class="card-body p-6">
                <!-- Logo & Title -->
                <div class="text-center mb-6">
                    <div class="mb-3" style="font-size: 2.5rem; color: var(--color-navy);">
                        <i class="bi bi-box-seam-fill"></i>
                    </div>
                    <h2 class="mb-2" style="color: var(--color-navy);">ProcureApp</h2>
                    <p class="text-secondary mb-0">Σύστημα Διαχείρισης Προμηθειών</p>
                </div>

                <!-- Divider -->
                <hr style="border-color: var(--color-gray-200); margin-bottom: var(--space-6);">

                <!-- Login Form -->
                <form method="post">
                    <!-- Username -->
                    <div class="form-group">
                        <label class="form-label">Όνομα Χρήστη</label>
                        <input type="text" name="username" class="form-control" required autofocus placeholder="Εισάγετε το όνομα χρήστη σας">
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="form-label">Κωδικός Πρόσβασης</label>
                        <input type="password" name="password" class="form-control" required placeholder="Εισάγετε τον κωδικό σας">
                    </div>

                    <!-- Submit Button -->
                    <button class="btn btn-primary w-100 mt-4" type="submit" style="font-weight: var(--font-weight-semibold); padding: var(--space-3);">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Σύνδεση
                    </button>
                </form>

                <!-- Footer -->
                <div class="text-center mt-6" style="font-size: var(--font-size-sm); color: var(--color-text-secondary);">
                    <p class="mb-0">Για βοήθεια επικοινωνήστε με τον διαχειριστή</p>
                </div>
            </div>
        </div>

        <!-- Additional Info -->
        <div class="text-center mt-4" style="color: var(--color-text-secondary); font-size: var(--font-size-sm);">
            <p class="mb-1"><i class="bi bi-shield-check me-1"></i> Ασφαλής Σύνδεση</p>
            <p><i class="bi bi-key me-1"></i> Κρυπτογραφημένα Δεδομένα</p>
        </div>
    </div>
</div>
{% endblock %}
