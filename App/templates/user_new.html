{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="mb-3">
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.users') }}"><i class="bi bi-arrow-left"></i> Πίσω στους Χρήστες</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0">Δημιουργία Νέου Χρήστη</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Κωδικός Πρόσβασης <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label">Πλήρες Όνομα / Επωνυμία (Display Name) <span class="text-danger">*</span></label>
                            <input type="text" name="display_name" class="form-control" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Όνομα</label>
                            <input type="text" name="first_name" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Επώνυμο</label>
                            <input type="text" name="last_name" class="form-control">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Ρόλος <span class="text-danger">*</span></label>
                            <select name="role" class="form-select" required>
                                <option value="company">Υπάλληλος (Company)</option>
                                <option value="supplier">Προμηθευτής (Supplier)</option>
                                <option value="chief">Διευθυντής (Chief)</option>
                            </select>
                        </div>

                        <div class="col-12 text-muted small mb-3">
                            <i class="bi bi-info-circle"></i> Αν επιλέξετε ρόλο "Προμηθευτής", θα μπορέσετε να συμπληρώσετε τα στοιχεία της εταιρείας του (ΑΦΜ, Διεύθυνση κλπ) στο επόμενο βήμα, κάνοντας "Επεξεργασία" στον χρήστη.
                        </div>

                        <div class="col-12 d-flex justify-content-between mt-4">
                            <a href="{{ url_for('admin.users') }}" class="btn btn-light">Ακύρωση</a>
                            <button type="submit" class="btn btn-success px-4">Δημιουργία</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
